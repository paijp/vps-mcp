# https://github.com/paijp/vps-mcp
#
# vps-mcp nginx configuration (single-host edition).
# server_name __DOMAIN__ is replaced by make %.setupdone.
# Certificate paths are initially self-signed; certbot --nginx replaces them
# after Let's Encrypt succeeds. certbot.timer handles renewal.

# HTTP: serve ACME challenges; forward everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: direct TLS termination on the host (no PROXY protocol).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── OAuth discovery (no auth required) ───────────────────────────────────
    location = /.well-known/oauth-authorization-server {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /mcp/authorize: OAuth authorization endpoint ─────────────────────────
    # Accessed by the user's browser, so no IP restriction.
    location /mcp/authorize {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /mcp/token: MCP OAuth token endpoint ─────────────────────────────────
    # Restricted to Anthropic's IP range so only Claude.ai can obtain tokens.
    location /mcp/token {
        allow 160.79.104.0/21;
        deny  all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /mcp/sse and /mcp/messages: MCP SSE transport ────────────────────────
    location /mcp/sse {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /mcp/messages {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Default: serve static files ──────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html index.htm;
    }
}
